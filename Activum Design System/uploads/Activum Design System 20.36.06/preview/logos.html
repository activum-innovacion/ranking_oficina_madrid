<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; height: 150px; }
.cell { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 16px; }
.label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
img { height: 56px; width: auto; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell" style="background:#F5F3F2;">
    <img src="../assets/logo-positive.svg" alt="Positive logo">
    <div class="label" style="color:#8F8D8C;">Positive</div>
  </div>
  <div class="cell" style="background:#1F1D1A;">
    <img src="../assets/logo-negative.svg" alt="Negative logo">
    <div class="label" style="color:#8F8D8C;">Negative</div>
  </div>
  <div class="cell" style="background:#EBE3DB;">
    <img src="../assets/logo-mono-black.svg" alt="Mono logo">
    <div class="label" style="color:#8F8D8C;">Mono</div>
  </div>
</div>
</body>
</html>
