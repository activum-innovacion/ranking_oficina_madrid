<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F3F2; font-family: 'DM Sans', sans-serif; padding: 20px; }
.row { display: flex; gap: 20px; align-items: flex-end; }
.item { text-align: center; }
.box { background: #D4C5B2; border: 1.5px solid rgba(31,29,26,0.15); }
.lbl { font-size: 9px; color: #8F8D8C; margin-top: 6px; letter-spacing: 0.05em; }
.val { font-size: 9px; color: #4B4845; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="width:44px;height:44px;border-radius:4px"></div><div class="lbl">sm</div><div class="val">4px</div></div>
  <div class="item"><div class="box" style="width:44px;height:44px;border-radius:8px"></div><div class="lbl">md</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="width:52px;height:52px;border-radius:16px"></div><div class="lbl">lg</div><div class="val">16px</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px;border-radius:28px"></div><div class="lbl">xl</div><div class="val">28px</div></div>
  <div class="item"><div class="box" style="width:72px;height:36px;border-radius:9999px"></div><div class="lbl">full</div><div class="val">∞</div></div>
</div>
</body>
</html>
