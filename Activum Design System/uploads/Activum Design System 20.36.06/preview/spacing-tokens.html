<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F3F2; font-family: 'DM Sans', sans-serif; padding: 20px; }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.bar { background: #8E2D44; height: 14px; border-radius: 3px; }
.label { font-size: 10px; color: #8F8D8C; width: 80px; flex-shrink: 0; }
.val { font-size: 10px; color: #4B4845; }
</style>
</head>
<body>
<div class="row"><div class="label">space-1 / 4px</div><div class="bar" style="width:4px"></div></div>
<div class="row"><div class="label">space-2 / 8px</div><div class="bar" style="width:8px"></div></div>
<div class="row"><div class="label">space-3 / 12px</div><div class="bar" style="width:12px"></div></div>
<div class="row"><div class="label">space-4 / 16px</div><div class="bar" style="width:16px"></div></div>
<div class="row"><div class="label">space-5 / 24px</div><div class="bar" style="width:24px"></div></div>
<div class="row"><div class="label">space-6 / 32px</div><div class="bar" style="width:32px"></div></div>
<div class="row"><div class="label">space-7 / 48px</div><div class="bar" style="width:48px"></div></div>
<div class="row"><div class="label">space-8 / 64px</div><div class="bar" style="width:64px"></div></div>
<div class="row"><div class="label">space-9 / 96px</div><div class="bar" style="width:96px"></div></div>
</body>
</html>
