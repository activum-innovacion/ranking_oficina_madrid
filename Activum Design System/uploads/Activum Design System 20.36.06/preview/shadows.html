<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #EBE3DB; font-family: 'DM Sans', sans-serif; padding: 24px; }
.row { display: flex; gap: 20px; align-items: center; }
.item { text-align: center; }
.box { background: #F5F3F2; border-radius: 12px; width: 80px; height: 56px; }
.lbl { font-size: 9px; color: #4B4845; margin-top: 8px; font-weight: 500; }
.val { font-size: 8px; color: #8F8D8C; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(31,29,26,0.08)"></div><div class="lbl">xs</div><div class="val">1px 2px</div></div>
  <div class="item"><div class="box" style="box-shadow:0 2px 8px rgba(31,29,26,0.10)"></div><div class="lbl">sm</div><div class="val">2px 8px</div></div>
  <div class="item"><div class="box" style="box-shadow:0 4px 20px rgba(31,29,26,0.12)"></div><div class="lbl">md</div><div class="val">4px 20px</div></div>
  <div class="item"><div class="box" style="box-shadow:0 8px 40px rgba(31,29,26,0.14)"></div><div class="lbl">lg</div><div class="val">8px 40px</div></div>
  <div class="item"><div class="box" style="box-shadow:0 20px 60px rgba(31,29,26,0.18)"></div><div class="lbl">xl</div><div class="val">20px 60px</div></div>
</div>
</body>
</html>
