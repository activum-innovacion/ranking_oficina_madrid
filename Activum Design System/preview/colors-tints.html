<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color Tints & Shades" subtitle="Negro tints and accent dark/light" viewport="700x220" -->
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F3F2; font-family: 'Roboto', sans-serif; padding: 20px; }
.row { display: flex; gap: 8px; margin-bottom: 12px; }
.swatch { flex: 1; }
.color { height: 40px; border-radius: 6px; border: 1px solid rgba(31,29,26,0.07); }
.label { margin-top: 4px; font-size: 9px; color: #8F8D8C; letter-spacing: 0.03em; }
.group-label { font-size: 10px; font-weight: 500; color: #4B4845; margin-bottom: 6px; letter-spacing: 0.08em; text-transform: uppercase; }
</style>
</head>
<body>
<div style="margin-bottom:14px">
  <div class="group-label">Negro Scale</div>
  <div class="row">
    <div class="swatch"><div class="color" style="background:#1F1D1A;"></div><div class="label">#1F1D1A</div></div>
    <div class="swatch"><div class="color" style="background:#4B4845;"></div><div class="label">#4B4845</div></div>
    <div class="swatch"><div class="color" style="background:#8F8D8C;"></div><div class="label">#8F8D8C</div></div>
    <div class="swatch"><div class="color" style="background:#CCCAC9;"></div><div class="label">#CCCAC9</div></div>
    <div class="swatch"><div class="color" style="background:#F5F3F2;"></div><div class="label">#F5F3F2</div></div>
  </div>
</div>
<div>
  <div class="group-label">Acento Scale</div>
  <div class="row">
    <div class="swatch"><div class="color" style="background:#6B1F32;"></div><div class="label">#6B1F32</div></div>
    <div class="swatch"><div class="color" style="background:#8E2D44;"></div><div class="label">#8E2D44</div></div>
    <div class="swatch"><div class="color" style="background:#C06078;"></div><div class="label">#C06078</div></div>
    <div class="swatch"><div class="color" style="background:#E8B0BB;"></div><div class="label">#E8B0BB</div></div>
    <div class="swatch"><div class="color" style="background:#F9EEF0;"></div><div class="label">#F9EEF0</div></div>
  </div>
</div>
</body>
</html>
