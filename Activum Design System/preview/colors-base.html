<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Base Colors" subtitle="5-color palette with Pantone refs and usage %" viewport="700x180" -->
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F3F2; font-family: 'Roboto', sans-serif; padding: 20px; }
.swatches { display: flex; gap: 12px; }
.swatch { flex: 1; }
.color { border-radius: 10px; border: 1px solid rgba(31,29,26,0.08); }
.name { margin-top: 8px; font-size: 11px; font-weight: 500; color: #1F1D1A; }
.hex  { font-size: 10px; color: #8F8D8C; margin-top: 2px; }
.pms  { font-size: 9px; color: #CCCAC9; margin-top: 1px; }
.pct  { font-size: 9px; color: #8E2D44; font-weight: 500; margin-top: 3px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="color" style="height:70px;background:#1F1D1A;"></div><div class="name">Negro</div><div class="hex">#1F1D1A</div><div class="pms">Black 6C</div><div class="pct">10%</div></div>
  <div class="swatch"><div class="color" style="height:70px;background:#F5F3F2;"></div><div class="name">Blanco roto</div><div class="hex">#F5F3F2</div><div class="pms">P179-1</div><div class="pct">50%</div></div>
  <div class="swatch"><div class="color" style="height:70px;background:#EBE3DB;"></div><div class="name">Nude I</div><div class="hex">#EBE3DB</div><div class="pms">P51-1C</div><div class="pct">20%</div></div>
  <div class="swatch"><div class="color" style="height:70px;background:#D4C3B3;"></div><div class="name">Nude II</div><div class="hex">#D4C3B3</div><div class="pms">4755</div><div class="pct">10%</div></div>
  <div class="swatch"><div class="color" style="height:70px;background:#8E2D44;"></div><div class="name">Color Acento</div><div class="hex">#8E2D44</div><div class="pms">194</div><div class="pct">10%</div></div>
</div>
</body>
</html>
