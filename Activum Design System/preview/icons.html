<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Brand Icons" subtitle="Five custom brand icons on beige + accent" viewport="700x220" -->
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F3F2; font-family: 'Roboto', sans-serif; padding: 20px 24px; }

/* Icon class styles — applied to all inline SVGs */
.cls-1 { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.cls-2 { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
/* ICONO 3 uses filled paths with no class */
.icon-filled path { fill: currentColor; stroke: none; }

.row { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
.group-label { font-size: 9px; font-weight: 500; color: #8F8D8C; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }

.item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.wrap {
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; flex-shrink: 0;
}
.wrap svg { display: block; }
.lbl { font-size: 9px; color: #8F8D8C; letter-spacing: 0.06em; text-align: center; }

/* Surfaces */
.on-beige  { background: #EBE3DB; color: #1F1D1A; }
.on-light  { background: #F5F3F2; color: #1F1D1A; border: 1px solid rgba(31,29,26,0.1); }
.on-dark   { background: #1F1D1A; color: #F5F3F2; }
.on-accent { background: #8E2D44; color: #F5F3F2; }
</style>
</head>
<body>

<div class="group-label">5 custom brand icons — on beige</div>
<div class="row" style="margin-bottom:18px;">

  <!-- ICONO 1 -->

    </div>
    <div class="lbl">Icono 1</div>
  </div>

  </div>

  <!-- ICONO 4 -->
  <div class="item">
    <div class="wrap on-beige" style="width:56px;height:56px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48.78 48.78" width="30" height="30">
        <polygon class="cls-1" points="16.74 15.97 31.74 15.97 35.36 22.35 24.39 34.36 13.35 22.12 16.74 15.97"/>

  <!-- Divider -->
  <div style="width:1px;height:50px;background:rgba(31,29,26,0.12);margin:6px 4px 0;align-self:flex-start;"></div>

  <!-- Dark surface sample -->
  <div class="item">
    <div class="wrap on-dark" style="width:56px;height:56px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50.02 50.02" width="30" height="30">
        <path class="cls-1" d="M30.13,16.77c2.66,1.76,4.42,4.81,4.42,8.29,0,5.45-4.34,9.87-9.7,9.87s-9.7-4.42-9.7-9.87c0-3.31,1.6-6.24,4.06-8.04"/>

  <!-- Accent surface sample -->
  <div class="item">
    <div class="wrap on-accent" style="width:56px;height:56px;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48.78 48.78" width="30" height="30">

</div>
</body>
</html>
